<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ 3D Aural Universe · play the cosmos</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            cursor: grab;
        }
        canvas {
            display: block;
        }
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            letter-spacing: 1px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(10,10,25,0.5);
            backdrop-filter: blur(15px);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeHint 6s forwards;
        }
        @keyframes fadeHint {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hint">🎹 Press any letter key · Drag to orbit · Scroll to zoom</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- DOM ----------
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const hint = document.querySelector('.hint');

        // ---------- Audio setup ----------
        let audioCtx;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) { /* audio unavailable */ }

        // ---------- Key mapping (pentatonic, multi‑octave) ----------
        const keyFreqs = {};
        const baseC = 130.81;
        const pentatonicRatios = [1, 9/8, 5/4, 3/2, 5/3, 2, 9/4, 5/2];
        // Rows from bottom to top, adding octave shift
        const keyRows = [
            'zxcvbnm,',    // octave -1
            'asdfghjkl',    // base octave
            'qwertyuio',    // octave +1
            '1234567890'    // octave +2
        ];
        keyRows.forEach((row, rowIndex) => {
            const octaveShift = rowIndex - 1; // -1,0,1,2
            for (let i = 0; i < row.length; i++) {
                const key = row[i].toLowerCase();
                const ratio = pentatonicRatios[i % pentatonicRatios.length];
                const freq = baseC * Math.pow(2, octaveShift) * ratio;
                keyFreqs[key] = freq;
            }
        });

        // ---------- Three.js setup ----------
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x030310);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 60);
        camera.position.set(8, 4, 12);
        camera.lookAt(0, 0, 0);

        // ---------- Glow texture (for particles) ----------
        function createGlowTexture() {
            const size = 128;
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,200,1)');
            gradient.addColorStop(0.5, 'rgba(255,150,100,0.8)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(c);
        }
        const glowMap = createGlowTexture();

        // ---------- Dynamic particles (bursts) ----------
        const MAX_DYNAMIC = 4000;
        const dynamicParticles = []; // { pos, vel, life, color, size }
        const dynGeometry = new THREE.BufferGeometry();
        const dynPositions = new Float32Array(MAX_DYNAMIC * 3);
        const dynColors = new Float32Array(MAX_DYNAMIC * 3);
        const dynSizes = new Float32Array(MAX_DYNAMIC);
        dynGeometry.setAttribute('position', new THREE.BufferAttribute(dynPositions, 3));
        dynGeometry.setAttribute('color', new THREE.BufferAttribute(dynColors, 3));
        dynGeometry.setAttribute('size', new THREE.BufferAttribute(dynSizes, 1));
        // Initially empty, draw range 0
        dynGeometry.setDrawRange(0, 0);

        const dynMaterial = new THREE.PointsMaterial({
            size: 0.35,
            map: glowMap,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: true,
            transparent: true,
            vertexColors: true,
            sizeAttenuation: true,
        });
        const dynPoints = new THREE.Points(dynGeometry, dynMaterial);
        scene.add(dynPoints);

        // ---------- Background stars ----------
        const starCount = 1800;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const radius = 15 + Math.random() * 30;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = Math.sin(phi) * Math.cos(theta) * radius;
            starPositions[i*3+1] = Math.sin(phi) * Math.sin(theta) * radius * 0.6;
            starPositions[i*3+2] = Math.cos(phi) * radius;
            const hue = Math.random() * 0.2 + 0.55;
            const col = new THREE.Color().setHSL(hue, 0.8, 0.7 + Math.random() * 0.3);
            starColors[i*3] = col.r;
            starColors[i*3+1] = col.g;
            starColors[i*3+2] = col.b;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        const starMat = new THREE.PointsMaterial({
            size: 0.12,
            map: glowMap,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexColors: true,
            sizeAttenuation: true,
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // ---------- Central core ----------
        const coreGeom = new THREE.SphereGeometry(0.6, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xffaa88 });
        const core = new THREE.Mesh(coreGeom, coreMat);
        scene.add(core);
        // Core glow sprite
        const spriteTex = createGlowTexture();
        const spriteMat = new THREE.SpriteMaterial({ map: spriteTex, blending: THREE.AdditiveBlending, depthWrite: false, color: 0xffaa88 });
        const coreSprite = new THREE.Sprite(spriteMat);
        coreSprite.scale.set(4, 4, 1);
        core.add(coreSprite);
        // Pulsing light
        const pointLight = new THREE.PointLight(0xffaa88, 1.2, 15);
        core.add(pointLight);

        // ---------- Orbiting rings ----------
        function createRing(radius, color, rotationSpeed, tiltX, tiltZ) {
            const ringGeo = new THREE.TorusGeometry(radius, 0.03, 32, 120);
            const ringMat = new THREE.MeshBasicMaterial({ color, blending: THREE.AdditiveBlending, depthWrite: false });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = tiltX;
            ring.rotation.z = tiltZ;
            ring.userData = { speed: rotationSpeed, baseRot: ring.rotation.clone() };
            return ring;
        }
        const rings = [
            createRing(1.8, 0xff6688, 0.2, Math.PI/2, 0),
            createRing(2.4, 0x66aaff, -0.3, Math.PI/3, Math.PI/6),
            createRing(2.2, 0x88ffaa, 0.25, Math.PI/2.2, Math.PI/4),
        ];
        rings.forEach(r => scene.add(r));

        // ---------- Camera controls ----------
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let spherical = { radius: 13, theta: 0.8, phi: 1.1 }; // initial camera spherical coords
        const target = new THREE.Vector3(0, 0, 0);

        function updateCameraPosition() {
            const sinPhi = Math.sin(spherical.phi);
            const x = spherical.radius * sinPhi * Math.sin(spherical.theta);
            const y = spherical.radius * Math.cos(spherical.phi);
            const z = spherical.radius * sinPhi * Math.cos(spherical.theta);
            camera.position.set(x, y, z);
            camera.lookAt(target);
        }
        updateCameraPosition();

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            prevMouse.x = e.clientX;
            prevMouse.y = e.clientY;
            canvas.style.cursor = 'grabbing';
        });
        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - prevMouse.x;
            const dy = e.clientY - prevMouse.y;
            spherical.theta -= dx * 0.005;
            spherical.phi -= dy * 0.005;
            spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi));
            prevMouse.x = e.clientX;
            prevMouse.y = e.clientY;
            updateCameraPosition();
        });
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            spherical.radius += e.deltaY * 0.01;
            spherical.radius = Math.max(3.5, Math.min(22, spherical.radius));
            updateCameraPosition();
        }, { passive: false });
        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                prevMouse.x = e.touches[0].clientX;
                prevMouse.y = e.touches[0].clientY;
            }
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging && e.touches.length === 1) {
                const dx = e.touches[0].clientX - prevMouse.x;
                const dy = e.touches[0].clientY - prevMouse.y;
                spherical.theta -= dx * 0.005;
                spherical.phi -= dy * 0.005;
                spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi));
                prevMouse.x = e.touches[0].clientX;
                prevMouse.y = e.touches[0].clientY;
                updateCameraPosition();
            }
        }, { passive: false });
        canvas.addEventListener('touchend', () => { isDragging = false; });

        // ---------- Audio + visual trigger ----------
        function playNote(key) {
            const freq = keyFreqs[key.toLowerCase()];
            if (!freq) return;

            // Audio
            if (audioCtx && audioCtx.state === 'running') {
                const now = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                osc1.type = 'triangle';
                osc1.frequency.value = freq;
                osc2.type = 'sine';
                osc2.frequency.value = freq * 2.02;
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1800, now);
                filter.frequency.exponentialRampToValueAtTime(250, now + 0.35);
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

                osc1.connect(filter);
                osc2.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + 0.55);
                osc2.stop(now + 0.55);
            }

            // Visual: burst particles from core
            const hue = ((freq - 80) / 600) * 360;
            const color = new THREE.Color().setHSL(hue % 360 / 360, 1, 0.6);
            const burstCount = 24;
            const spawnPos = new THREE.Vector3(0, 0, 0); // core

            for (let i = 0; i < burstCount; i++) {
                const dir = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                ).normalize();
                const speed = 1.5 + Math.random() * 4.5 + (freq / 200);
                const particle = {
                    pos: spawnPos.clone(),
                    vel: dir.multiplyScalar(speed),
                    life: 1.0,
                    decay: 0.008 + Math.random() * 0.025,
                    color: color.clone(),
                    size: 0.18 + Math.random() * 0.5,
                };
                // Add to dynamic list
                if (dynamicParticles.length >= MAX_DYNAMIC) {
                    dynamicParticles.shift(); // remove oldest
                }
                dynamicParticles.push(particle);
            }

            // Core pulse
            core.scale.set(1.5, 1.5, 1.5);
        }

        // Keyboard listener
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const key = e.key;
            if (key.length === 1 && keyFreqs[key.toLowerCase()]) {
                e.preventDefault();
                playNote(key);
                // Resume audio context on first interaction
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                // Hide hint
                if (hint) hint.style.opacity = '0';
            }
        });

        // ---------- Animation loop ----------
        let clock = new THREE.Clock();

        function animate() {
            const dt = Math.min(0.1, clock.getDelta());
            const time = performance.now() * 0.001;

            // Rotate background stars
            stars.rotation.y += 0.03 * dt;
            stars.rotation.x += 0.01 * dt;

            // Rotate rings
            rings.forEach(ring => {
                ring.rotation.z += ring.userData.speed * dt;
                ring.rotation.x += ring.userData.speed * 0.5 * dt;
            });

            // Update dynamic particles
            for (let i = dynamicParticles.length - 1; i >= 0; i--) {
                const p = dynamicParticles[i];
                p.life -= p.decay * dt * 60;
                if (p.life <= 0.02) {
                    dynamicParticles.splice(i, 1);
                    continue;
                }
                p.pos.x += p.vel.x * dt;
                p.pos.y += p.vel.y * dt;
                p.pos.z += p.vel.z * dt;
                // slight damping
                p.vel.multiplyScalar(0.998);
            }

            // Update geometry buffers
            const count = Math.min(dynamicParticles.length, MAX_DYNAMIC);
            for (let i = 0; i < count; i++) {
                const p = dynamicParticles[i];
                dynPositions[i*3] = p.pos.x;
                dynPositions[i*3+1] = p.pos.y;
                dynPositions[i*3+2] = p.pos.z;
                dynColors[i*3] = p.color.r;
                dynColors[i*3+1] = p.color.g;
                dynColors[i*3+2] = p.color.b;
                dynSizes[i] = p.size * p.life;
            }
            dynGeometry.attributes.position.needsUpdate = true;
            dynGeometry.attributes.color.needsUpdate = true;
            dynGeometry.attributes.size.needsUpdate = true;
            dynGeometry.setDrawRange(0, count);

            // Core pulse decay
            core.scale.lerp(new THREE.Vector3(1,1,1), 0.1);
            coreSprite.material.color.setHSL(0.08 + Math.sin(time*3)*0.02, 0.8, 0.7);
            pointLight.intensity = 1.2 + Math.sin(time*5)*0.3;

            // Render
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // ---------- Resize ----------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateCameraPosition();
        animate();

        console.log('✨ 3D Aural Universe ready – press keys to play');
    </script>
</body>
</html>
